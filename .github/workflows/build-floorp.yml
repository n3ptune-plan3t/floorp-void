name: Build Floorp for Void Linux

# ── Triggers ──────────────────────────────────────────────────────────────────
# Push to main, or manually via the Actions tab (so you can re-trigger a build
# whenever Floorp releases a new version).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      floorp_version:
        description: 'Floorp version to build (e.g. 12.12.0)'
        required: false
        default: '12.12.0'

# ── Why this platform ─────────────────────────────────────────────────────────
# GitHub Actions free tier:
#   • Unlimited minutes on PUBLIC repositories (standard ubuntu-latest runner)
#   • Standard runner: 4-core x86_64, ~14 GB RAM, ~14 GB SSD
#   • Firefox/Floorp source builds typically take 3–6 hours here with PGO+LTO
#   • Artifact upload limit: 2 GB (the .xbps package is ~80–100 MB, fine)
#
# FREE alternatives if you need more power:
#   • Cirrus CI      — free for open-source; offers 8-core runners
#   • Sourcehut builds — https://builds.sr.ht  (generous free tier)
#   • Codeberg Woodpecker — free CI for Codeberg repos
#   • Oracle Cloud Free Tier — always-free 4-core ARM VM as self-hosted runner
#     (ARM build of Floorp is not yet supported upstream, so use x86_64 VMs)
#
# IMPORTANT: Keep this repository PUBLIC to get unlimited free minutes.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build floorp xbps package
    runs-on: ubuntu-24.04   # Latest Ubuntu LTS — Floorp docs require "latest Ubuntu"

    env:
      FLOORP_VERSION: ${{ github.event.inputs.floorp_version || '12.12.0' }}
      # A GitHub token with public_repo scope is required by Floorp's build
      # system to download build artifacts from GitHub Actions.
      # Add your PAT as a repository secret named FLOORP_GITHUB_TOKEN.
      GITHUB_TOKEN: ${{ secrets.FLOORP_GITHUB_TOKEN || github.token }}

    steps:
      # ── 1. Checkout this repo (contains the xbps-src template) ──────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Deno (required by Floorp's feles-build system) ────────────
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # ── 3. Install system build deps ─────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm \
            rustup \
            cbindgen \
            python3 python3-pip \
            nodejs \
            nasm yasm \
            unzip zip \
            pkg-config autoconf \
            libgtk-3-dev \
            libdbus-1-dev \
            libx11-dev libxcomposite-dev libxdamage-dev \
            libxext-dev libxfixes-dev libxrandr-dev libxt-dev \
            libasound2-dev \
            libnss3-dev libnspr4-dev \
            libfreetype-dev libfontconfig1-dev \
            libpango1.0-dev libatk1.0-dev libatk-bridge2.0-dev \
            libdrm-dev libgl1-mesa-dev \
            libevent-dev libvpx-dev libwebp-dev \
            libjpeg-turbo8-dev libpng-dev \
            libicu-dev libharfbuzz-dev \
            zlib1g-dev \
            xbps

      # ── 4. Set up Rust toolchain ──────────────────────────────────────────────
      - name: Set up Rust
        run: |
          rustup default stable
          rustup target add x86_64-unknown-linux-gnu

      # ── 5. Clone Floorp source ────────────────────────────────────────────────
      - name: Clone Floorp ${{ env.FLOORP_VERSION }}
        run: |
          git clone --depth=1 --branch v${{ env.FLOORP_VERSION }} \
            https://github.com/Floorp-Projects/Floorp floorp-src
          cd floorp-src
          deno install

      # ── 6. Write the mozconfig ────────────────────────────────────────────────
      # This is the same config as in the xbps-src template, minus the
      # Void-specific variables replaced with their literal equivalents.
      - name: Write mozconfig
        run: |
          JOBS=$(nproc)
          cat > floorp-src/.mozconfig << EOF
          ac_add_options --enable-application=browser

          export CC=clang
          export CXX=clang++
          export AR=llvm-ar
          export NM=llvm-nm
          export RANLIB=llvm-ranlib
          ac_add_options --enable-linker=lld

          # znver1 = Zen / Zen+ (Ryzen 3 3250U).  Safe on any modern AMD Ryzen.
          export CFLAGS="-march=znver1 -mtune=znver1 -O2 -pipe"
          export CXXFLAGS="-march=znver1 -mtune=znver1 -O2 -pipe"
          export RUSTFLAGS="-C target-cpu=znver1 -C opt-level=3"
          export RUSTC_OPT_LEVEL=2

          # Thin LTO — fast, most of the gain, works in 4 GB RAM
          ac_add_options --enable-lto=thin

          # PGO — ~15-20% runtime improvement; worth the extra build time in CI
          ac_add_options MOZ_PGO=1

          ac_add_options --enable-release
          ac_add_options --enable-strip
          ac_add_options --enable-install-strip
          ac_add_options --disable-debug
          ac_add_options --disable-tests
          ac_add_options --disable-crashreporter
          ac_add_options --disable-updater
          ac_add_options --disable-maintenance-service
          ac_add_options --disable-backgroundtasks

          ac_add_options --with-system-nss
          ac_add_options --with-system-nspr
          ac_add_options --with-system-libevent
          ac_add_options --with-system-libvpx
          ac_add_options --with-system-webp
          ac_add_options --with-system-jpeg
          ac_add_options --with-system-icu
          ac_add_options --with-system-harfbuzz

          ac_add_options --enable-default-toolkit=cairo-gtk3-wayland-only

          mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-floorp
          mk_add_options MOZ_MAKE_FLAGS="-j${JOBS}"
          EOF

      # ── 7. Build (feles-build → mach → feles-build) ───────────────────────────
      - name: Build Floorp (before-mach phase)
        working-directory: floorp-src
        run: deno task feles-build build --phase before-mach

      - name: Build Floorp (mach build — this takes 3-5 hours in CI)
        working-directory: floorp-src
        run: ./mach build

      - name: Build Floorp (after-mach phase)
        working-directory: floorp-src
        run: deno task feles-build build --phase after-mach

      # ── 8. Package as tarball ─────────────────────────────────────────────────
      - name: Package
        working-directory: floorp-src
        run: ./mach package

      # ── 9. Wrap into an xbps package ──────────────────────────────────────────
      # We use xbps-create (ships with the xbps package installed above) to
      # create a proper .xbps binary package that can be installed with
      # xbps-install on your Void Linux machine.
      - name: Create xbps package
        run: |
          set -e
          PKGDIR=$(mktemp -d)
          APPDIR="$PKGDIR/usr/lib/floorp"
          mkdir -p "$APPDIR"
          mkdir -p "$PKGDIR/usr/bin"
          mkdir -p "$PKGDIR/usr/share/applications"
          mkdir -p "$PKGDIR/usr/share/icons/hicolor/128x128/apps"

          # Unpack the mach-generated tarball
          TARBALL=$(ls floorp-src/obj-floorp/dist/floorp-*.tar.bz2 | head -1)
          tar xf "$TARBALL" -C "$APPDIR" --strip-components=1

          # Wrapper script
          cat > "$PKGDIR/usr/bin/floorp" << 'WRAPPER'
          #!/bin/sh
          export MOZ_ENABLE_WAYLAND=1
          export LIBVA_DRIVER_NAME=radeonsi
          export MOZ_DISABLE_RDD_SANDBOX=1
          export NO_AT_BRIDGE=1
          export MOZ_DBUS_REMOTE=1
          exec /usr/lib/floorp/floorp "$@"
          WRAPPER
          chmod 755 "$PKGDIR/usr/bin/floorp"

          # Desktop entry
          cat > "$PKGDIR/usr/share/applications/floorp.desktop" << 'DESKTOP'
          [Desktop Entry]
          Version=1.0
          Name=Floorp
          GenericName=Web Browser
          Exec=floorp %u
          Icon=floorp
          Terminal=false
          Type=Application
          Categories=Network;WebBrowser;
          MimeType=text/html;x-scheme-handler/http;x-scheme-handler/https;
          StartupNotify=true
          StartupWMClass=floorp
          DESKTOP

          # Icon
          if [ -f "$APPDIR/browser/chrome/icons/default/default128.png" ]; then
            cp "$APPDIR/browser/chrome/icons/default/default128.png" \
               "$PKGDIR/usr/share/icons/hicolor/128x128/apps/floorp.png"
          fi

          # Build the .xbps package
          xbps-create \
            --architecture x86_64 \
            --deps "dbus gtk+3 nss nspr alsa-lib libX11 libXrandr libXt libdrm mesa-dri" \
            --homepage "https://floorp.app" \
            --license "MPL-2.0" \
            --maintainer "CI Build" \
            --pkgver "floorp-${{ env.FLOORP_VERSION }}_1" \
            --quiet \
            --short-desc "Floorp browser (source build, znver1+LTO+PGO)" \
            "$PKGDIR"

          mkdir -p artifacts
          mv floorp-${{ env.FLOORP_VERSION }}_1.x86_64.xbps artifacts/

      # ── 10. Upload the .xbps as a build artifact ───────────────────────────────
      - name: Upload xbps package
        uses: actions/upload-artifact@v4
        with:
          name: floorp-${{ env.FLOORP_VERSION }}-x86_64-xbps
          path: artifacts/*.xbps
          retention-days: 30   # keep for 30 days (free plan limit)

      # ── 11. Also create a GitHub Release (optional, but convenient) ────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.FLOORP_VERSION }}-void
          name: Floorp ${{ env.FLOORP_VERSION }} for Void Linux
          body: |
            Source-built Floorp ${{ env.FLOORP_VERSION }} for Void Linux x86_64.

            **Optimisations applied:**
            - Clang + LLD compiler toolchain
            - `-march=znver1` (AMD Ryzen Zen/Zen+ — Ryzen 3 3250U and similar)
            - Thin LTO
            - PGO (Profile-Guided Optimisation)
            - System libraries (nss, nspr, libvpx, icu, harfbuzz…)
            - Wayland-native build (best for Mesa radeonsi / Vega 3)
            - VA-API video decode enabled (hardware video on Vega 3)

            **Install on Void Linux:**
            ```sh
            sudo xbps-install --repository=. floorp
            # or with xi:
            xi floorp
            ```
          files: artifacts/*.xbps
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
