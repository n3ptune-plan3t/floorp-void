name: Build Floorp (Void Linux XBPS)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'floorp/template'      # adjust if your template is in srcpkgs/floorp/template
      - '.github/workflows/build-floorp.yml'
  pull_request:
    paths:
      - 'floorp/template'
  workflow_dispatch:           # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    # Use the glibc full image (recommended for heavy builds like browsers)
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged   # needed for xbps-src bootstrap in some cases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system and install build tools
        run: |
          xbps-install -Suy
          xbps-install -y xtools xbps-src git

      - name: Prepare xbps-src environment
        run: |
          # Clone void-packages if you want to build against latest master (recommended)
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages

          # Copy your template into the srcpkgs directory
          mkdir -p srcpkgs/floorp
          cp -a /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/floorp/* srcpkgs/floorp/ || true
          # If your template is directly in repo root as floorp/template, adjust the path above

          # Bootstrap the build environment (this can take 10-30 minutes first time)
          ./xbps-src -m masterdir bootstrap

      - name: Build Floorp package
        working-directory: /void-packages
        run: |
          # Optional: enable restricted packages if needed (Floorp is not restricted)
          # echo 'XBPS_ALLOW_RESTRICTED=yes' >> etc/xbps-src.conf

          ./xbps-src -m masterdir pkg -j$(nproc) floorp

      - name: Collect built packages
        run: |
          mkdir -p ./artifacts
          cp /void-packages/hostdir/binpkgs/*/*.xbps ./artifacts/ 2>/dev/null || true
          cp /void-packages/hostdir/binpkgs/*/*-dbg*.xbps ./artifacts/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floorp-xbps-packages
          path: ./artifacts/
          retention-days: 7

      - name: Show build summary
        if: always()
        working-directory: /void-packages
        run: |
          echo "=== Build log tail ==="
          tail -n 100 /void-packages/masterdir-x86_64/builddir/floorp*/.xbps-build.log 2>/dev/null || echo "No log found"
          echo "=== Packages built ==="
          ls -lh ./hostdir/binpkgs/*/*.xbps 2>/dev/null || echo "No packages found"
