name: Build Floorp (Void Linux XBPS)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'floorp/template'
      - '.github/workflows/build-floorp.yml'
  pull_request:
    paths:
      - 'floorp/template'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Update Void Linux and install basic tools
        run: |
          xbps-install -Suy
          xbps-install -y xtools git bash

      - name: Clone void-packages and prepare Floorp template
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages

          # Create directory for your custom package
          mkdir -p srcpkgs/floorp

          # Copy your template (adjust path if needed)
          cp -a /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/floorp/* srcpkgs/floorp/ || true

          # If your template is at the repo root as floorp/template:
          # cp /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/floorp/template srcpkgs/floorp/

      - name: Bootstrap the build environment
        working-directory: /void-packages
        run: |
          ./xbps-src binary-bootstrap

      - name: Build Floorp package
        working-directory: /void-packages
        run: |
          # Optional: allow more jobs and increase timeout if needed
          ./xbps-src -j$(nproc) pkg floorp

      - name: Collect built packages
        run: |
          mkdir -p ./artifacts
          cp /void-packages/hostdir/binpkgs/*/*.xbps ./artifacts/ 2>/dev/null || true
          cp /void-packages/hostdir/binpkgs/*/*-dbg*.xbps ./artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floorp-xbps-packages
          path: ./artifacts/
          retention-days: 14

      - name: Build summary (always run)
        if: always()
        working-directory: /void-packages
        run: |
          echo "=== Last 100 lines of build log ==="
          find masterdir* -name "*.log" -exec tail -n 100 {} + 2>/dev/null || echo "No build log found"
          echo "=== Built packages ==="
          ls -lh hostdir/binpkgs/*/*.xbps 2>/dev/null || echo "No .xbps files found"
