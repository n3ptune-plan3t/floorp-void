name: Build Floorp (Void Linux XBPS)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'floorp/template'
      - '.github/workflows/build-floorp.yml'
  pull_request:
    paths:
      - 'floorp/template'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Update system and install basic tools
        run: |
          xbps-install -Suy
          xbps-install -y xtools git bash sudo

      - name: Create non-root user (void-builder) and prepare environment
        run: |
          useradd -m -s /bin/bash void-builder
          echo "void-builder ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/void-builder

          # Clone void-packages as the builder user
          su - void-builder -c '
            git clone --depth=1 https://github.com/void-linux/void-packages.git ~/void-packages
          '

          # Copy your Floorp template
          su - void-builder -c '
            mkdir -p ~/void-packages/srcpkgs/floorp
            cp -a /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/floorp/* \
                   ~/void-packages/srcpkgs/floorp/ 2>/dev/null || true
          '

      - name: Bootstrap the build environment
        run: |
          su - void-builder -c '
            cd ~/void-packages
            ./xbps-src binary-bootstrap
          '

      - name: Build Floorp package
        run: |
          su - void-builder -c '
            cd ~/void-packages
            ./xbps-src -j$(nproc) pkg floorp
          '

      - name: Collect built packages
        run: |
          mkdir -p ./artifacts
          cp /home/void-builder/void-packages/hostdir/binpkgs/*/*.xbps ./artifacts/ 2>/dev/null || true
          cp /home/void-builder/void-packages/hostdir/binpkgs/*/*-dbg*.xbps ./artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floorp-xbps-packages
          path: ./artifacts/
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          echo "=== Build log tail ==="
          su - void-builder -c '
            find ~/void-packages/masterdir* -name "*.log" -exec tail -n 80 {} + 2>/dev/null || echo "No log found"
          ' || true
          echo "=== Built packages ==="
          ls -lh /home/void-builder/void-packages/hostdir/binpkgs/*/*.xbps 2>/dev/null || echo "No .xbps files found"
